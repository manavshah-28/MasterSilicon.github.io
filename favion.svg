<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#030b16"/>

  <defs>

    <!-- Gradient using your ambient glow palette -->
    <linearGradient id="msGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E8C8"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- MS Logo -->
  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Syne, Roboto, DM Sans, sans-serif"
    font-size="140"
    font-weight="700"
    letter-spacing="2"
    fill="url(#msGrad)"
    filter="url(#glow)"
  >
    MS
  </text>

</svg>